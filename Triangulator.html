<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulate — iDegenerate</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Karla:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest-dark: #1a3a2e;
            --forest-mid: #2d5f4c;
            --forest-light: #3d7c5f;
            --sage: #7ba591;
            --cream: #faf7f2;
            --earth: #c9a88a;
            --rust: #b85c38;
            --gold: #e6b17e;

            /* Heatmap gradient stops — yellow (earliest) → dark red (latest) */
            --heat-0: #f5e642;   /* yellow (furthest) */
            --heat-1: #f0b429;   /* amber */
            --heat-2: #e07a30;   /* orange */
            --heat-3: #c94a2a;   /* red-orange */
            --heat-4: #8b0000;   /* dark red */
            --heat-5: #1a0000;   /* near-black (target) */

            --target-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Karla', sans-serif;
            background: var(--forest-dark);
            color: var(--cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        #topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 24px;
            background: rgba(26, 58, 46, 0.97);
            border-bottom: 1px solid rgba(123, 165, 145, 0.25);
            flex-shrink: 0;
            z-index: 1000;
        }

        #topbar h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            color: var(--gold);
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        #topbar .meta {
            font-size: 0.82em;
            color: var(--sage);
            white-space: nowrap;
        }

        #topbar .meta span {
            color: var(--cream);
            font-weight: 600;
        }

        .spacer { flex: 1; }

        /* Window size control */
        .window-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82em;
            color: var(--sage);
        }

        .window-control label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.78em;
            font-weight: 600;
            color: var(--sage);
        }

        .window-control input[type="range"] {
            -webkit-appearance: none;
            width: 90px;
            height: 4px;
            background: rgba(123, 165, 145, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .window-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
        }

        #windowVal {
            font-weight: 600;
            color: var(--cream);
            min-width: 14px;
            text-align: center;
        }

        /* Status bar */
        #statusBar {
            font-size: 0.82em;
            color: var(--sage);
            padding: 6px 24px;
            background: rgba(26, 58, 46, 0.8);
            border-bottom: 1px solid rgba(123, 165, 145, 0.12);
            flex-shrink: 0;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #statusBar.error { color: #e07a30; }
        #statusBar.loading { color: var(--earth); }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(230, 177, 126, 0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
            display: none;
        }

        #statusBar.loading .spinner { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main layout ── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Map ── */
        #map {
            flex: 1;
            position: relative;
        }

        /* ── Right panel: sequence strip ── */
        #panel {
            width: 280px;
            flex-shrink: 0;
            background: rgba(26, 58, 46, 0.97);
            border-left: 1px solid rgba(123, 165, 145, 0.2);
            overflow-y: auto;
            padding: 20px 16px;
        }

        #panel h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1em;
            color: var(--earth);
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        #panel .panel-sub {
            font-size: 0.75em;
            color: var(--sage);
            margin-bottom: 16px;
            font-weight: 300;
        }

        .seq-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .seq-item:hover {
            background: rgba(123, 165, 145, 0.1);
            border-color: rgba(123, 165, 145, 0.2);
        }

        .seq-item.is-target {
            background: rgba(230, 177, 126, 0.08);
            border-color: rgba(230, 177, 126, 0.35);
        }

        .seq-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 3px;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.3);
        }

        .seq-item.is-target .seq-dot {
            border-radius: 0;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            width: 16px;
            height: 16px;
        }

        .seq-info {
            flex: 1;
            min-width: 0;
        }

        .seq-name {
            font-size: 0.82em;
            font-style: italic;
            color: var(--gold);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .seq-common {
            font-size: 0.75em;
            color: var(--sage);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .seq-time {
            font-size: 0.72em;
            color: rgba(250, 247, 242, 0.5);
            margin-top: 2px;
        }

        .seq-coords {
            font-size: 0.7em;
            color: rgba(250, 247, 242, 0.4);
            margin-top: 1px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
        }

        .seq-coords.no-coord {
            font-style: italic;
            color: rgba(250, 247, 242, 0.2);
        }

        .seq-target-label {
            font-size: 0.68em;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            margin-top: 2px;
        }

        .seq-idx {
            font-size: 0.7em;
            color: rgba(250, 247, 242, 0.35);
            flex-shrink: 0;
            align-self: center;
        }

        /* Legend gradient bar */
        #legendBar {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(123, 165, 145, 0.2);
        }

        #legendBar .leg-label {
            font-size: 0.72em;
            color: var(--sage);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .gradient-strip {
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right,
                var(--heat-0),
                var(--heat-1),
                var(--heat-2),
                var(--heat-3),
                var(--heat-4),
                var(--heat-5)
            );
            margin-bottom: 4px;
        }

        .gradient-strip.sym {
            background: linear-gradient(to right,
                var(--heat-0),
                var(--heat-3),
                var(--heat-5),
                var(--heat-3),
                var(--heat-0)
            );
        }

        .gradient-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7em;
            color: rgba(250, 247, 242, 0.45);
            text-align: center;
        }

        .target-legend {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.75em;
            color: rgba(250, 247, 242, 0.6);
        }

        .star-icon {
            color: var(--gold);
            font-size: 1.1em;
        }

        /* ── Leaflet popup overrides ── */
        .leaflet-popup-content-wrapper {
            background: var(--forest-dark);
            color: var(--cream);
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .leaflet-popup-content {
            margin: 14px 16px;
            font-family: 'Karla', sans-serif;
        }

        .leaflet-popup-tip { background: var(--forest-dark); }

        .popup-title {
            font-style: italic;
            font-size: 1.05em;
            color: var(--gold);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .popup-common {
            color: var(--sage);
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .popup-target-badge {
            display: inline-block;
            background: rgba(230, 177, 126, 0.15);
            border: 1px solid rgba(230, 177, 126, 0.4);
            color: var(--gold);
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 2px 7px;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .popup-detail {
            font-size: 0.82em;
            color: var(--cream);
            margin-bottom: 3px;
            opacity: 0.9;
        }

        .popup-detail a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(230, 177, 126, 0.5);
        }

        .popup-detail a:hover {
            color: var(--earth);
            border-bottom-color: var(--earth);
        }

        /* Map layer toggle */
        .leaflet-control-layers {
            background: var(--forest-dark) !important;
            border: 1px solid rgba(123, 165, 145, 0.3) !important;
            border-radius: 6px !important;
            color: var(--cream) !important;
        }

        .leaflet-control-layers label {
            color: var(--cream) !important;
            font-family: 'Karla', sans-serif !important;
            font-size: 0.85em !important;
        }

        /* Empty/error state */
        #emptyState {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--sage);
            pointer-events: none;
            z-index: 10;
        }

        #emptyState h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            color: var(--earth);
            margin-bottom: 8px;
        }

        #emptyState p {
            font-size: 0.85em;
            line-height: 1.6;
            max-width: 300px;
        }

        /* ── Standalone input form ── */
        /* ── Floating input HUD (always on top of map) ── */
        #inputHud {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 1000;
            width: 300px;
            background: rgba(26, 58, 46, 0.93);
            border: 1px solid rgba(123, 165, 145, 0.35);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            overflow: hidden;
            transition: height 0.25s ease;
        }

        #hudHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(123, 165, 145, 0.15);
        }

        #hudHeader span {
            font-size: 0.78em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--sage);
        }

        #hudToggle {
            font-size: 0.75em;
            color: rgba(123, 165, 145, 0.6);
            transition: transform 0.2s;
        }

        #hudBody {
            padding: 12px 14px 14px;
        }

        #hudBody.collapsed {
            display: none;
        }

        .hud-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .hud-input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(250, 247, 242, 0.07);
            border: 1px solid rgba(123, 165, 145, 0.3);
            border-radius: 6px;
            color: var(--cream);
            font-family: 'Karla', sans-serif;
            font-size: 0.88em;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-width: 0;
        }

        .hud-input:focus {
            outline: none;
            border-color: var(--sage);
            box-shadow: 0 0 0 2px rgba(123, 165, 145, 0.12);
        }

        .hud-input::placeholder {
            color: rgba(250, 247, 242, 0.22);
        }

        .hud-btn {
            padding: 8px 12px;
            background: var(--forest-light);
            border: 1px solid rgba(123, 165, 145, 0.4);
            border-radius: 6px;
            color: var(--cream);
            font-family: 'Karla', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .hud-btn:hover { background: var(--forest-mid); }
        .hud-btn:disabled { opacity: 0.5; cursor: default; }

        .hud-error {
            font-size: 0.75em;
            color: var(--rust);
            margin-top: 7px;
            min-height: 14px;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
    <h1>⟡ Triangulate</h1>
    <div class="meta" id="metaDisplay">Loading observation…</div>
    <div class="spacer"></div>
    <div class="window-control">
        <label>Window</label>
        <input type="range" id="windowSlider" min="3" max="11" step="2" value="7">
        <span id="windowVal">7</span>
    </div>
</div>

<!-- Status bar -->
<div id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Initialising…</span>
</div>


<!-- Main -->
<div id="main">
    <div id="map">
        <!-- Floating input HUD -->
        <div id="inputHud">
    <div id="hudHeader">
        <span>Load observation</span>
        <span id="hudToggle">▲</span>
    </div>
    <div id="hudBody">
        <div class="hud-row">
            <input type="text" class="hud-input" id="obsIdInput" placeholder="Observation ID…" autocomplete="off" />
            <button class="hud-btn" id="formSubmit">Load</button>
        </div>
        <div class="hud-error" id="formError"></div>
    </div>
</div>
        <div id="emptyState" style="display:none;">
            <h3>No location data</h3>
            <p>All observations in this window lack coordinate data and cannot be mapped.</p>
        </div>
    </div>
    <div id="panel">
        <h2>Sequence</h2>
        <p class="panel-sub">Observations ordered by time</p>
        <div id="seqList"></div>
        <div id="legendBar" style="display:none;">
            <div class="leg-label">Temporal distance from target</div>
            <div class="gradient-strip sym"></div>
            <div class="gradient-labels"><span>Further</span><span>Target</span><span>Further</span></div>
            <div class="target-legend">
                <span class="star-icon">★</span>
                <span>Target observation</span>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Heatmap colour scale (6 stops, blue → red) ──────────────────────────────
const HEAT_STOPS = [
    [245, 230,  66],  // yellow (furthest)
    [240, 180,  41],  // amber
    [224, 122,  48],  // orange
    [201,  74,  42],  // red-orange
    [139,   0,   0],  // dark red
    [ 26,   0,   0],  // near-black (target)
];

function heatColor(t) {
    // t in [0, 1]
    const s = t * (HEAT_STOPS.length - 1);
    const lo = Math.floor(s), hi = Math.min(lo + 1, HEAT_STOPS.length - 1);
    const f = s - lo;
    const c = HEAT_STOPS[lo].map((v, i) => Math.round(v + f * (HEAT_STOPS[hi][i] - v)));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function heatHex(t) {
    const s = t * (HEAT_STOPS.length - 1);
    const lo = Math.floor(s), hi = Math.min(lo + 1, HEAT_STOPS.length - 1);
    const f = s - lo;
    const c = HEAT_STOPS[lo].map((v, i) => Math.round(v + f * (HEAT_STOPS[hi][i] - v)));
    return '#' + c.map(v => v.toString(16).padStart(2,'0')).join('');
}

// ── Parse URL params ─────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
let TARGET_ID  = urlParams.get('observation_id');
let USER_LOGIN = urlParams.get('user_id');
let OBS_DATE   = urlParams.get('date');   // YYYY-MM-DD

function setStatus(msg, type = '') {
    const bar = document.getElementById('statusBar');
    bar.className = type;
    document.getElementById('statusText').textContent = msg;
}

// ── Standalone form logic ─────────────────────────────────────────────────────
const obsIdInput = document.getElementById('obsIdInput');
const formSubmit = document.getElementById('formSubmit');
const formError  = document.getElementById('formError');
const hudBody    = document.getElementById('hudBody');
const hudToggle  = document.getElementById('hudToggle');

// HUD collapse toggle
document.getElementById('hudHeader').addEventListener('click', () => {
    const collapsed = hudBody.classList.toggle('collapsed');
    hudToggle.textContent = collapsed ? '▼' : '▲';
});

async function resolveObservationId(rawId) {
    // Fetch a single observation to get user_login and date
    const res = await fetch(`https://api.inaturalist.org/v1/observations/${rawId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const obs = data.results?.[0];
    if (!obs) throw new Error('Observation not found');
    return {
        id: String(obs.id),
        user_login: obs.user?.login,
        date: obs.observed_on
    };
}

formSubmit.addEventListener('click', async () => {
    const raw = obsIdInput.value.trim().replace(/[^0-9]/g, '');
    if (!raw) { formError.textContent = 'Please enter an observation ID.'; return; }
    formError.textContent = '';
    formSubmit.textContent = 'Resolving…';
    formSubmit.disabled = true;
    try {
        const resolved = await resolveObservationId(raw);
        TARGET_ID  = resolved.id;
        USER_LOGIN = resolved.user_login;
        OBS_DATE   = resolved.date;
        if (!USER_LOGIN || !OBS_DATE) throw new Error('Could not resolve observer or date.');
        fetchObservations();
    } catch (e) {
        formError.textContent = e.message;
    } finally {
        formSubmit.textContent = 'Load trail';
        formSubmit.disabled = false;
    }
});

obsIdInput.addEventListener('keydown', e => { if (e.key === 'Enter') formSubmit.click(); });

// ── Leaflet map setup ────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });

const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
});

const satelliteLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
    maxZoom: 19
});

streetLayer.addTo(map);
L.control.layers({ "Street": streetLayer, "Satellite": satelliteLayer }).addTo(map);

// ── Window size slider ───────────────────────────────────────────────────────
let windowSize = 7;
const slider = document.getElementById('windowSlider');
const windowVal = document.getElementById('windowVal');

slider.addEventListener('input', () => {
    windowSize = parseInt(slider.value);
    windowVal.textContent = windowSize;
    if (allObservations.length) renderWindow();
});

// ── State ────────────────────────────────────────────────────────────────────
let allObservations = [];   // all obs for user+date, sorted by time
let markers = [];
let polyline = null;

// ── Fetch all observations for this user+date ────────────────────────────────
async function fetchObservations() {
    setStatus(`Fetching observations for ${USER_LOGIN} on ${OBS_DATE}…`, 'loading');
    document.getElementById('metaDisplay').innerHTML =
        `Observer: <span>${USER_LOGIN}</span> &nbsp;·&nbsp; Date: <span>${OBS_DATE}</span>`;

    let page = 1, fetched = [];
    while (true) {
        const url = new URL('https://api.inaturalist.org/v1/observations');
        url.searchParams.set('user_id', USER_LOGIN);
        url.searchParams.set('on', OBS_DATE);
        url.searchParams.set('verifiable', 'any');
        url.searchParams.set('order_by', 'observed_on');
        url.searchParams.set('order', 'asc');
        url.searchParams.set('per_page', '200');
        url.searchParams.set('page', page);

        try {
            const res = await fetch(url.toString());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const results = data.results || [];
            fetched.push(...results);
            if (fetched.length >= (data.total_results || 0) || results.length === 0) break;
            page++;
        } catch (e) {
            setStatus(`API error: ${e.message}`, 'error');
            return;
        }
    }

    if (fetched.length === 0) {
        setStatus('No observations found for this user and date.', 'error');
        return;
    }

    // Sort by time_observed_at (most precise), fall back to observed_on
    fetched.sort((a, b) => {
        const ta = a.time_observed_at || a.observed_on || '';
        const tb = b.time_observed_at || b.observed_on || '';
        return ta.localeCompare(tb);
    });

    allObservations = fetched;
    setStatus(`Loaded ${fetched.length} observations for ${USER_LOGIN} on ${OBS_DATE}.`);
    renderWindow();
}

// ── Build window around target and render ────────────────────────────────────
function renderWindow() {
    // Find target index
    const targetIdx = allObservations.findIndex(o => String(o.id) === String(TARGET_ID));
    if (targetIdx === -1) {
        setStatus(`Target observation ${TARGET_ID} not found in this user's day.`, 'error');
        return;
    }

    const half = Math.floor(windowSize / 2);
    const start = Math.max(0, targetIdx - half);
    const end   = Math.min(allObservations.length - 1, targetIdx + half);
    const window_obs = allObservations.slice(start, end + 1);
    const targetLocalIdx = targetIdx - start;

    clearMap();
    buildSequencePanel(window_obs, targetLocalIdx, start);
    plotObservations(window_obs, targetLocalIdx);
}

function clearMap() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    if (polyline) { map.removeLayer(polyline); polyline = null; }
}

// ── Sequence panel ───────────────────────────────────────────────────────────
function buildSequencePanel(obs, targetIdx, globalOffset) {
    const list = document.getElementById('seqList');
    list.innerHTML = '';

    const n = obs.length;

    // Precompute time distances in seconds from target
    const targetTime = obs[targetIdx]?.time_observed_at
        ? new Date(obs[targetIdx].time_observed_at).getTime() : null;
    const timeDists = obs.map(o => {
        if (!targetTime || !o.time_observed_at) return null;
        return Math.abs(new Date(o.time_observed_at).getTime() - targetTime) / 1000;
    });
    const maxTimeDist = Math.max(1, ...timeDists.filter(d => d !== null));

    obs.forEach((o, i) => {
        const isTarget = i === targetIdx;
        const hasTime = timeDists[i] !== null;
        // t=1 → near-black (target), t=0 → yellow (furthest); gray if no timestamp
        const t = isTarget ? 1 : (hasTime ? Math.max(0, 1 - timeDists[i] / maxTimeDist) : null);
        const color = t !== null ? heatHex(t) : '#888';


        const timeStr = o.time_observed_at
            ? new Date(o.time_observed_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            : '—';

        const lat = o.geojson?.coordinates?.[1] ?? o.location?.split(',')[0];
        const lng = o.geojson?.coordinates?.[0] ?? o.location?.split(',')[1];

        const item = document.createElement('div');
        item.className = 'seq-item' + (isTarget ? ' is-target' : '');
        item.dataset.idx = i;

        item.innerHTML = `
            <div class="seq-dot" style="background:${color};"></div>
            <div class="seq-info">
                <div class="seq-name">${o.taxon?.name || 'Unknown'}</div>
                ${o.taxon?.preferred_common_name
                    ? `<div class="seq-common">${o.taxon.preferred_common_name}</div>`
                    : ''}
                <div class="seq-time">${timeStr}</div>
                ${(lat && lng) ? `<div class="seq-coords">${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}</div>` : '<div class="seq-coords no-coord">no coordinates</div>'}
                ${isTarget ? `<div class="seq-target-label">★ Target</div>` : ''}
            </div>
            <div class="seq-idx">#${globalOffset + i + 1}</div>
        `;

        item.addEventListener('click', () => {
            if (markers[i]) {
                markers[i].openPopup();
                map.panTo(markers[i].getLatLng());
            }
        });

        list.appendChild(item);
    });

    document.getElementById('legendBar').style.display = 'block';
}

// ── Plot on map ──────────────────────────────────────────────────────────────
function plotObservations(obs, targetIdx) {
    const n = obs.length;
    const validPoints = [];

    // Precompute time distances in seconds from target
    const targetTimePlot = obs[targetIdx]?.time_observed_at
        ? new Date(obs[targetIdx].time_observed_at).getTime() : null;
    const timeDistsPlot = obs.map(o => {
        if (!targetTimePlot || !o.time_observed_at) return null;
        return Math.abs(new Date(o.time_observed_at).getTime() - targetTimePlot) / 1000;
    });
    const maxTimeDistPlot = Math.max(1, ...timeDistsPlot.filter(d => d !== null));

    obs.forEach((o, i) => {
        const isTarget = i === targetIdx;
        const hasTimePlot = timeDistsPlot[i] !== null;
        const t = isTarget ? 1 : (hasTimePlot ? Math.max(0, 1 - timeDistsPlot[i] / maxTimeDistPlot) : null);
        const color = t !== null ? heatHex(t) : '#888';


        const lat = o.geojson?.coordinates?.[1] ?? o.location?.split(',')[0];
        const lng = o.geojson?.coordinates?.[0] ?? o.location?.split(',')[1];

        if (!lat || !lng) {
            markers.push(null);
            return;
        }

        const ll = [parseFloat(lat), parseFloat(lng)];
        validPoints.push(ll);

        const timeStr = o.time_observed_at
            ? new Date(o.time_observed_at).toLocaleString([], {
                hour: '2-digit', minute: '2-digit',
                year: 'numeric', month: 'short', day: 'numeric'
              })
            : o.observed_on || '—';

        const obsUrl = `https://www.inaturalist.org/observations/${o.id}`;

        // Build marker icon
        let iconHtml;
        if (isTarget) {
            iconHtml = `
                <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="14,2 17.5,10.5 27,11.3 20.3,17.2 22.5,26.5 14,21.5 5.5,26.5 7.7,17.2 1,11.3 10.5,10.5"
                        fill="${color}" stroke="#fff" stroke-width="1.5"/>
                </svg>`;
        } else {
            iconHtml = `
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="9" cy="9" r="7" fill="${color}" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
                </svg>`;
        }

        const icon = L.divIcon({
            html: iconHtml,
            className: '',
            iconSize: isTarget ? [28, 28] : [18, 18],
            iconAnchor: isTarget ? [14, 14] : [9, 9],
            popupAnchor: [0, isTarget ? -16 : -11]
        });

        const marker = L.marker(ll, { icon, zIndexOffset: isTarget ? 1000 : 0 });

        const popupHtml = `
            ${isTarget ? '<div class="popup-target-badge">★ Target observation</div>' : ''}
            <div class="popup-title">${o.taxon?.name || 'Unknown taxon'}</div>
            ${o.taxon?.preferred_common_name
                ? `<div class="popup-common">${o.taxon.preferred_common_name}</div>`
                : ''}
            <div class="popup-detail"><strong>Time:</strong> ${timeStr}</div>
            <div class="popup-detail"><strong>Coords:</strong> ${parseFloat(lat).toFixed(5)}, ${parseFloat(lng).toFixed(5)}</div>
            <div class="popup-detail"><strong>Observer:</strong> ${o.user?.login || USER_LOGIN}</div>
            <div class="popup-detail"><strong>Link:</strong> <a href="${obsUrl}" target="_blank">View on iNaturalist</a></div>
        `;

        marker.bindPopup(popupHtml);
        marker.addTo(map);
        markers.push(marker);

        // Open target popup automatically
        if (isTarget) {
            marker.openPopup();
        }
    });

    // Draw connecting polyline through valid points
    if (validPoints.length > 1) {
        polyline = L.polyline(validPoints, {
            color: 'rgba(250, 247, 242, 0.25)',
            weight: 1.5,
            dashArray: '4 6'
        }).addTo(map);
    }

    // Fit map
    if (validPoints.length > 0) {
        const bounds = L.latLngBounds(validPoints);
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
        document.getElementById('emptyState').style.display = 'none';
    } else {
        document.getElementById('emptyState').style.display = 'block';
    }
}

// ── Go ───────────────────────────────────────────────────────────────────────
if (!TARGET_ID || !USER_LOGIN || !OBS_DATE) {
    setStatus('Enter an observation ID in the panel to begin.');
} else {
    fetchObservations();
}
</script>
